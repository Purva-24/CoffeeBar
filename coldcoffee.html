<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cold Coffee</title>
    <style>
        .border {
            border: 3px black solid;
        }
        .heading {
            padding: 5px;
            background-color: #C9B59C;
            display: flex;
            justify-content: center;
            font-size: 40px;
        }

        .img {
            padding: 5px;
            display: flex;
            justify-content: center;
            background-color: #D9CFC7;

        }

        .paragraph {
            padding: 5px;
            background-color: #EFE9E3;
            font-size: 25px;
            font-style: inherit;
            height: 500px;
        }

    </style>
</head>
<body>
    <div class="heading border">
        <h1>Nornal Cold Coffee</h1>
    </div>
    <div class="img">
        <img src="cold_coffee.jpg" alt="" height="700px">
    </div>
    <div class="paragraph border">
        <p>Cold coffee is a popular chilled beverage known for its refreshing, creamy, and frothy texture, commonly enjoyed during hot weather or as a quick caffeine boost</p>
        <p>intregredient:</p>
        <ul>1. Instant coffee powder</ul>
        <ul>2. Sugar</ul>
        <ul>3. Chilled milk</ul>
    </div>
