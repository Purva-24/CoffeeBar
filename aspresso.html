<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspresso</title>
    <style>
         .border {
            border: 3px black solid;
        }
        .heading {
            padding: 5px;
            background-color: #C9B59C;
            display: flex;
            justify-content: center;
            font-size: 40px;
        }

        .img {
            padding: 5px;
            display: flex;
            justify-content: center;
            background-color: #D9CFC7;

        }

        .paragraph {
            padding: 5px;
            background-color: #EFE9E3;
            font-size: 25px;
            font-style: inherit;
            height: 500px;
        }
    </style>
</head>
<body>
    <div class="heading border">
        <h1>Aspresso</h1>
    </div>
    <div class="img">
        <img src="aspresso.jpg" alt="" height="700px">
    </div>
    <div class="paragraph border">
        <p>Espresso is a concentrated form of coffee produced by forcing hot water under high pressure through finely ground coffee beans.</p>
        <p>Ingredient:</p>
        <ul>1. Instant coffee powder</ul>
        <ul>2. Water</ul>
        <ul>3. Milk</ul>
        <ul>4. Cocoa powder</ul>
        <ul>5. Cinnamon</ul>
    </div>
</body>
</html>
