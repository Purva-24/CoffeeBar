<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin</title>
    <style>
        .border {
            border: 3px black solid;
        }
        
        .heading {
            padding: 5px;
            background-color: #DCC5B2;
            display: flex;
            justify-content: center;
            font-size: 25px;
        }
          
        .forms {
            padding: 30px;
            background-color: #FAF7F3;
            display: flex;
            justify-content: center;
        }

        .border2 {
            border : 10px #B17457 double;
        }

        .form {
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 600px;
            width: 500px;
            gap: 40px;
            background-color: #F0E4D3;
        }

        .box {
            height:40px;
            width: 400px;
        }

        .button {
            height: 40px;
            background-color: #C38154;
            width: 200px;
            display: flex;
            justify-content: center;
            font-size: 20px;
            
        }

        .signin {
            display: flex;
            justify-content: center;
            font: 20px;
        }
    </style>
</head>
<body>
    <div class="heading border">
        <h2>Sign In</h2>
    </div>
    <div class="forms">
        <div class="form border2">
           <div class="signin"><input placeholder="your name" class="box"></div>
           <div class="signin"><input placeholder="your mobile number" class="box"></div>
           <div class="signin"><input placeholder="email" class="box"></div>
           <div class="signin"><input placeholder="password" class="box"></div>
           <div class="signin"><button class="button">Sign in </button></div>
    </div>
    </div>
</body>
</html>
