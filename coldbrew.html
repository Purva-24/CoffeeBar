<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Brew</title>
    <style>
        .border {
            border: 3px black solid;
        }
        .heading {
            padding: 5px;
            background-color: #C9B59C;
            display: flex;
            justify-content: center;
            font-size: 40px;
        }

        .img {
            padding: 5px;
            display: flex;
            justify-content: center;
            background-color: #D9CFC7;

        }

        .paragraph {
            padding: 5px;
            background-color: #EFE9E3;
            font-size: 25px;

            height: 500px;
        }

    </style>
</head>
<body>
    <div class="heading border">
        <h1>Cold Brew</h1>
    </div>
    <div class="img">
        <img src="cold_brew.jpg" alt="" height="700px">
    </div>
    <div class="paragraph border">
        <p> Cold Brew Coffee is a smooth, less acidic coffee beverage made by steeping coarsely ground coffee beans in room temperature water for an extended period, typically between 12 to 24 hours.</p>
         <p>Ingredients:</p>
         <ul>1. Coffee Bean</ul>
         <ul>2. water</ul>
         <ul>3. sweetners</ul>
         <ul>4. flavores </ul>
    </div>
